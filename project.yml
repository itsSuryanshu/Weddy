name: PupWeather
options:
  bundleIdPrefix: com.pupweather
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9BN38GQ338
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Avoid "My Mac (Designed for iPhone/iPad)" as a run destination — it
    # triggers install preflight failures when you mean to use the simulator.
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO

fileGroups:
  - tools
  - README.md
  - PupWeather.entitlements
  - PupWidgetExtension.entitlements

targets:
  PupWeather:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pupweather.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PupWeather.entitlements
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: PupWeather
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        NSLocationWhenInUseUsageDescription: "PupWeather uses your location to show the weather around your pup."
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.pupweather.app.refresh
    dependencies:
      - target: PupWidgetExtension
        embed: true

  PupWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - PupWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pupweather.app.widget
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PupWidgetExtension.entitlements
    info:
      path: PupWidget/Info.plist
      properties:
        CFBundleDisplayName: PupWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true

schemes:
  PupWeather:
    build:
      targets:
        PupWeather: all
        PupWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
